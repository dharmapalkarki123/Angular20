<div class="container py-5">

  <div class="card skill-card p-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

      <div class="d-flex align-items-center gap-3">
        <div class="step">01</div>

        <div>
          <h5 class="title mb-0">Skill / Technology Selector</h5>
          <small class="subtitle">
            Profile setup — click to select a skill, click again to remove it
          </small>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-outline-info btn-sm rounded-pill">MULTI SELECT</button>
        <button class="btn btn-outline-success btn-sm rounded-pill">TOGGLE</button>
      </div>

    </div>

    <!-- Top Row -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="text-secondary">Select your skills</span>

      <span class="selected-badge">
        {{ selectedSkills.length }} selected
      </span>
    </div>

    <!-- Skills -->
    <div class="d-flex flex-wrap gap-2">
      <span
        *ngFor="let skill of skills"
        (click)="toggleSkill(skill)"
        [class.active]="selectedSkills.includes(skill)"
        class="skill-chip"
      >
        {{ skill }}
      </span>
    </div>

    <!-- Bottom Hint -->
    <div class="hint mt-4 text-center">
      Click any skill above to select it
    </div>

  </div>

</div>
