<div class="container py-5">

  <div class="card skill-card p-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

      <div class="d-flex align-items-center gap-3">
        <div class="step">01</div>

        <div>
          <h5 class="title mb-0">Skill / Technology Selector</h5>
          <small class="subtitle">
            Profile setup — click to select a skill, click again to remove it
          </small>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-outline-info btn-sm rounded-pill">MULTI SELECT</button>
        <button class="btn btn-outline-success btn-sm rounded-pill">TOGGLE</button>
      </div>

    </div>

    <!-- Top Row -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="text-secondary">Select your skills</span>

      <span class="selected-badge">
        {{ selectedSkills.length }} selected
      </span>
    </div>

    <!-- Skills -->
    <div class="d-flex flex-wrap gap-2">
      <span
        *ngFor="let skill of skills"
        (click)="toggleSkill(skill)"
        [class.active]="selectedSkills.includes(skill)"
        class="skill-chip"
      >
        {{ skill }}
      </span>
    </div>

    <!-- Bottom Hint -->
    <div class="hint mt-4 text-center">
      Click any skill above to select it
    </div>

  </div>

</div>


<div class="container mt-4">

  <!-- Filter Tabs -->
  <div class="filter-tabs mb-4">
    <button
      class="tab-btn"
      [class.active]="selectedFilter === 'ALL'"
      (click)="filterData('ALL')">
      All <span>{{employees.length}}</span>
    </button>

    <button class="tab-btn" (click)="filterData('FRONTEND')">Frontend</button>
    <button class="tab-btn" (click)="filterData('BACKEND')">Backend</button>
    <button class="tab-btn" (click)="filterData('DESIGN')">Design</button>
    <button class="tab-btn" (click)="filterData('DEVOPS')">DevOps</button>
  </div>

  <!-- Table -->
  <div class="table-container">
    <table class="table custom-table">
      <thead>
      <tr>
        <th>SN</th>
        <th>Name</th>
        <th>Role</th>
        <th>Team</th>
        <th>Status</th>
      </tr>
      </thead>

      <tbody>
      <tr *ngFor="let emp of filteredEmployees; let i = index">
        <td>{{i + 1}}</td>
        <td>{{emp.name}}</td>
        <td>{{emp.role}}</td>

        <td>
            <span class="badge team" [ngClass]="emp.team.toLowerCase()">
              {{emp.team}}
            </span>
        </td>

        <td>
            <span class="badge status" [ngClass]="emp.status.toLowerCase().replace(' ', '-')">
              {{emp.status}}
            </span>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

</div>
